services:
  - type: web
    name: agridash-togo
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn dashboard.app:server --bind 0.0.0.0:$PORT --timeout 120 --workers 2
    envVars:
      - key: DASH_USER
        value: admin
      - key: DASH_PASSWORD
        generateValue: true
      - key: PYTHONUNBUFFERED
        value: "1"
    healthCheckPath: /_alive
